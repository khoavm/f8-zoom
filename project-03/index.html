<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            :root {
                --background-color: orange;
            }
            .container {
                display: flex;
                max-width: 100vw;
                width: 600px;
                margin: 0 auto;
                flex-direction: column;
                height: 100vh;
                gap: 40px;
            }
            .header {
                background-color: var(--background-color);
                flex-grow: 2;
            }
            .article {
                /* background-color: var(--background-color); */
                flex-grow: 5.8;
                display: flex;
                gap: 25px;
            }
            .article_item {
                background-color: var(--background-color);
                flex: 1;
            }
            .text {
                display: flex;
                flex-direction: column;
                gap: 30px;
                flex: 1;
            }
            .text1 {
                background-color: var(--background-color);
                flex: 1;
            }
            .text2 {
                background-color: var(--background-color);
                flex: 1;
            }
            .main {
                background-color: var(--background-color);
                flex-grow: 3.5;
            }
            .footer {
                background-color: var(--background-color);
                flex-grow: 1;
            }
        </style>
    </head>

    <div class="container">
        <div class="header"></div>
        <div class="article">
            <div class="article_item"></div>
            <div class="text">
                <div class="text1"></div>
                <div class="text2"></div>
            </div>
        </div>
        <div class="main"></div>
        <div class="footer"></div>
    </div>
    <body></body>
</html>
