<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            .froggy_container {
                width: 100vw;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 30px;
            }
            .pod {
                flex: 1;
                border: 1px solid black;
            }
            img {
                width: 100%;
            }
            p {
                text-align: center;
                font-size: 30px;
                font-weight: 600;
                color: blue;
            }
        </style>
    </head>
    <body>
        <div class="froggy_container">
            <div class="pod">
                <img src="./img/froggy-pod1.png" alt="" />
                <p>Hoàn thành Pond số 1</p>
            </div>
            <div class="pod">
                <img src="./img/froggy-pod2.png" alt="" />
                <p>Hoàn thành Pond số 2</p>
            </div>
        </div>
    </body>
</html>
